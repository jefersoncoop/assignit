<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitura do Documento - AssignIt</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h2 {
            color: #333;
        }

        p {
            color: #555;
            line-height: 1.6;
        }

        .doc-preview {
            width: 100%;
            height: 500px;
            border: 1px solid #ddd;
            margin: 20px 0;
            border-radius: 5px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            display: inline-block;
            margin: 10px;
        }

        .btn-primary {
            background: #28a745;
            color: white;
        }

        .btn-secondary {
            background: #007bff;
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Olá, {{ nome }}</h2>
        <p>Para finalizar sua atualização cadastral, leia e assine o Termo de Ciência e adesão à condição de
            Cooperado.</p>

        <iframe src="{{ pdf_url }}" class="doc-preview"></iframe>

        <div>
            <a href="{{ pdf_url }}" target="_blank" class="btn btn-secondary">Download PDF</a>
            <br><br>
            <a href="/sign/{{ request_id }}" class="btn btn-primary"
                style="font-size: 1.3em; padding: 15px 40px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">Prosseguir com a
                Assinatura
            </a>
        </div>
    </div>

</body>

</html>
